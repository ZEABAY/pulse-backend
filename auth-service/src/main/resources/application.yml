server:
  port: 8081

spring:
  application:
    name: auth-service
  main:
    web-application-type: reactive
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/pulse
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:com/zeabay/common/outbox/db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Keycloak: realm 'pulse', client 'pulse-backend-client'.
# Otomatik kurulum (infra/local keycloak --import-realm) kullanıyorsanız varsayılan secret 'pulse-backend-secret' yeterli.
# Manuel kurulumda: Keycloak UI → Credentials sekmesindeki Client secret değerini yazın veya KEYCLOAK_CLIENT_SECRET ile verin.
keycloak:
  auth-server-url: http://localhost:9080
  realm: pulse
  resource: pulse-backend-client
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:pulse-backend-secret}
  admin:
    username: ${KEYCLOAK_ADMIN_USER:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

# Log format
logging:
  pattern:
    level: "%5p [${spring.application.name:app},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    # 1. Kendi Projenin Logları:
    com.zeabay: DEBUG

    # 2. Keycloak ve Güvenlik Akışları (Yetkilendirme hatalarını bulmak için kritik):
    org.springframework.security: DEBUG

    # 3. WebFlux HTTP İstek/Yanıt Akışları:
    org.springframework.web.reactive: DEBUG

    # 4. R2DBC ve PostgreSQL Sorguları:
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql.QUERY: DEBUG # Çalışan SQL sorgularını gösterir
    io.r2dbc.postgresql.PARAM: DEBUG # SQL sorgularına giden parametreleri gösterir

    # 5. Kafka Producer Detayları (Çok gürültü yaparsa INFO'ya veya WARN'a çekebilirsin):
    org.apache.kafka.clients.producer: DEBUG

# Observability Configurations
management:
  tracing:
    sampling:
      probability: 1.0 # 100% of traces for DEV environment
    baggage:
      correlation:
        enabled: true
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


zeabay:
  outbox:
    polling-interval-ms: 10000