server:
  port: 8080

spring:
  application:
    name: pulse-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:9080}/realms/${KEYCLOAK_REALM:pulse}/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-api
              uri: ${AUTH_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"

            # Swagger aggregation: proxy /v3/api-docs/{service} → the actual service
            - id: auth-service-api-docs
              uri: ${AUTH_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

# CORS is handled by ZeabayCorsAutoConfiguration (zeabay-webflux).
# To override allowed origins for production, set:
#   zeabay.cors.allowed-origins: https://yourapp.com

springdoc:
  swagger-ui:
    # Swagger UI: http://localhost:8080/swagger-ui/index.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

zeabay:
  security:
    # Auth endpoints are public — no JWT required to register, login, verify, or refresh.
    # All other routes require a valid JWT (validated at the gateway and again at each service).
    public-paths:
      - /api/v1/auth/register
      - /api/v1/auth/login
      - /api/v1/auth/verify
      - /api/v1/auth/refresh
      - /actuator/**
      - /swagger-ui/**
      - /swagger-ui/index.html
      - /v3/api-docs/**
      - /webjars/**
