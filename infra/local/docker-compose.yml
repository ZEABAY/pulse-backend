# -------------------------------------------------------------------------------------------------
# LOCAL DEVELOPMENT ONLY
# -------------------------------------------------------------------------------------------------
# This Docker Compose file is intended for LOCAL development on a single machine.
#
# DO NOT use this configuration as-is in TEST/STAGING/PRODUCTION environments.
# - It uses dev-friendly defaults (e.g., exposed ports, weak/default credentials, single-node setups).
# - Services may run with in-memory / non-HA components and minimal durability guarantees.
# - A misused "docker compose down -v" or container recreation may cause irreversible DATA LOSS.
#
# For TEST/PROD, prepare separate compose/helm configs:
# - stronger secrets management (env/vault), restricted port exposure, TLS
# - persistent/replicated storage (DB, Kafka), proper backups/retention
# - tracing/logging backends with retention policies (e.g., Jaeger with persistent storage, not memory)
# -------------------------------------------------------------------------------------------------

name: pulse-local

services:
  postgres:
    image: postgres:17.2-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulse}
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pulse_postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sql:/docker-entrypoint-initdb.d/init-multiple-databases.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse} -d ${POSTGRES_DB:-pulse}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [ pulse ]

  redis:
    image: redis:7.4-alpine
    container_name: pulse-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - pulse_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [ pulse ]

  kafka:
    image: apache/kafka:3.9.0
    container_name: pulse-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - pulse_kafka_data:/var/lib/kafka/data
      - pulse_kafka_config:/mnt/shared/config
      - pulse_kafka_secrets:/etc/kafka/secrets
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks: [ pulse ]

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: pulse-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-pulse}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-pulse}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "9080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pulse_keycloak_data:/opt/keycloak/data
    networks: [ pulse ]

  jaeger:
    image: jaegertracing/jaeger:2.1.0
    container_name: pulse-jaeger
    command: [ "--config", "/etc/jaeger/config.yaml" ]
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./jaeger/jaeger-config.yaml:/etc/jaeger/config.yaml:ro
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks: [ pulse ]

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: pulse-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - pulse_grafana_data:/var/lib/grafana
    depends_on:
      - jaeger
    restart: unless-stopped
    networks: [ pulse ]

volumes:
  pulse_postgres_data:
    name: pulse_postgres_data
  pulse_redis_data:
    name: pulse_redis_data
  pulse_kafka_data:
    name: pulse_kafka_data
  pulse_kafka_config:
    name: pulse_kafka_config
  pulse_kafka_secrets:
    name: pulse_kafka_secrets
  pulse_grafana_data:
    name: pulse_grafana_data
  pulse_keycloak_data:
    name: pulse_keycloak_data
  pulse_jaeger_data:
    name: pulse_jaeger_data

networks:
  pulse:
    driver: bridge






